name: Auto-Update Recent Projects

on:
  schedule:
    # Runs the bot automatically once every day at midnight
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allows you to run it manually

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Fetch Latest Repos and Update README
        uses: actions/github-script@v6
        with:
          script: |
            // Fetch the 10 most recently PUSHED repositories
            const { data: repos } = await github.rest.repos.listForUser({
              username: 'samarthpandey-ai',
              sort: 'pushed', 
              direction: 'desc',
              per_page: 10
            });
            
            // Filter out the profile repo and forks, then keep the top 3
            // (Change the "3" below to "5" if you want to show more projects!)
            const filteredRepos = repos.filter(repo => repo.name !== 'samarthpandey-ai' && !repo.fork).slice(0, 3);
            
            // Format into a clean, modern list
            let repoList = '';
            filteredRepos.forEach(repo => {
              const desc = repo.description || 'Currently working on this project! 🚀';
              repoList += `🔹 **[${repo.name}](${repo.html_url})**\n> ${desc}\n\n`;
            });
            
            // Update the README
            const fs = require('fs');
            let readme = fs.readFileSync('README.md', 'utf8');
            readme = readme.replace(
              /<!-- START_RECENT_REPOS -->[\s\S]*<!-- END_RECENT_REPOS -->/,
              `<!-- START_RECENT_REPOS -->\n${repoList}<!-- END_RECENT_REPOS -->`
            );
            fs.writeFileSync('README.md', readme);

      - name: Commit and Push Changes
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add README.md
          git commit -m "docs: sort recent projects by last pushed date" || echo "No changes to commit"
          git push
