name: Auto-Update Recent Projects

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Fetch Latest Repos and Update README
        uses: actions/github-script@v6
        with:
          script: |
            // Fetch the 10 newest repos so we have enough to filter through
            const { data: repos } = await github.rest.repos.listForUser({
              username: 'samarthpandey-ai',
              sort: 'created',
              direction: 'desc',
              per_page: 10
            });
            
            // Filter out the profile repo itself AND any repositories you just forked from others
            const filteredRepos = repos.filter(repo => repo.name !== 'samarthpandey-ai' && !repo.fork).slice(0, 3);
            
            // Format into a clean, modern list instead of a clunky table
            let repoList = '';
            filteredRepos.forEach(repo => {
              // If you haven't written a description yet, use a friendly default message
              const desc = repo.description || 'Currently working on this project! 🚀';
              repoList += `🔹 **[${repo.name}](${repo.html_url})**\n> ${desc}\n\n`;
            });
            
            const fs = require('fs');
            let readme = fs.readFileSync('README.md', 'utf8');
            readme = readme.replace(
              /<!-- START_RECENT_REPOS -->[\s\S]*<!-- END_RECENT_REPOS -->/,
              `<!-- START_RECENT_REPOS -->\n${repoList}<!-- END_RECENT_REPOS -->`
            );
            fs.writeFileSync('README.md', readme);

      - name: Commit and Push Changes
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add README.md
          git commit -m "docs: improve layout and filter profile repo" || echo "No changes to commit"
          git push
